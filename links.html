<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quei // links</title>
    <meta name="description" content="Oficjalne linki Antoniego 'quei' Żabickiego.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@300;400;500;600&family=VT323&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>
    
    <style>
        :root {
            --blue: #00039A;
            --white: #F4F4F2;
            --serif: 'Instrument Serif', serif;
            --sans: 'Space Grotesk', sans-serif;
            --pixel: 'VT323', monospace;
            /* Używamy niebieskiego kursora, bo tło strony jest teraz białe */
            --cursor-star-blue: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='%2300039A' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z'/%3E%3C/svg%3E");
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        html, body {
            background-color: var(--white); /* Białe tło */
            color: var(--blue); /* Niebieskie elementy */
            font-family: var(--sans);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overscroll-behavior: none;
            min-height: 100vh;
        }

        /* Niestandardowy Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--white); border-left: 1px solid rgba(0, 3, 154, 0.2); }
        ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }

        /* Szum w tle (dopasowany do białego tła) */
        .noise-overlay {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
            pointer-events: none; z-index: 9998;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: noiseAnim 0.2s steps(2) infinite; opacity: 0.05;
            transform: translateZ(0); mix-blend-mode: multiply;
        }
        @keyframes noiseAnim {
            0% { transform: translate(0, 0); }
            50% { transform: translate(-2%, 2%); }
            100% { transform: translate(2%, -2%); }
        }

        /* Customowy Kursor */
        #custom-cursor {
            position: fixed; top: 0; left: 0;
            pointer-events: none; z-index: 10001;
            transition: opacity 0.15s ease;
        }
        #cursor-graphic {
            width: 28px; height: 28px;
            background-image: var(--cursor-star-blue);
            background-size: contain; background-repeat: no-repeat; background-position: center;
            animation: spin 5s linear infinite;
            transition: width 0.2s, height 0.2s, border-radius 0.2s, border 0.2s;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .cursor-link #cursor-graphic {
            background-image: none !important; width: 36px; height: 36px;
            border: 2px dashed var(--blue); border-radius: 50%;
            animation: spin 3s linear infinite;
        }

        /* Menu pod prawym przyciskiem */
        #context-menu {
            position: fixed; border: 2px solid var(--blue); box-shadow: 4px 4px 0 var(--blue);
            padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem;
            z-index: 10000; visibility: hidden; opacity: 0; transform: scale(0.95);
            transform-origin: top left; transition: opacity 0.1s, transform 0.1s;
            background-color: var(--white);
            color: var(--blue);
        }
        #context-menu.active { visibility: visible; opacity: 1; transform: scale(1); }
        #context-menu .context-header {
            font-size: 0.65rem; letter-spacing: 0.1em; border-bottom: 1px solid rgba(0,3,154,0.4);
            padding-bottom: 0.4rem; margin-bottom: 0.4rem; opacity: 0.7;
        }
        .context-item { font-size: 0.85rem; letter-spacing: 0.05em; display: inline-block; width: max-content; }

        .lowercase { text-transform: lowercase; }
        a { pointer-events: auto; text-decoration: none; color: inherit; }

        /* LINKTREE STYLES */
        .link-tree {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; padding: 4rem 1.5rem; position: relative; z-index: 10;
        }

        .profile-img {
            width: 130px; height: 130px; border-radius: 50%;
            border: 2px solid var(--blue); margin-bottom: 1.5rem;
            object-fit: cover; box-shadow: 6px 6px 0 var(--blue);
        }

        .title {
            font-family: var(--serif); font-size: clamp(3rem, 8vw, 4rem);
            margin-bottom: 0.25rem; letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 0.85rem; letter-spacing: 0.1em; opacity: 0.8;
            text-align: center; margin-bottom: 1.5rem;
        }

        .svg-ornament {
            color: var(--blue);
            margin-bottom: 3rem;
            animation: pulse 4s ease-in-out infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        .links-container {
            width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 1.25rem;
        }

        /* Zaokrąglone przyciski */
        .link-card {
            display: block; width: 100%; padding: 1.25rem; text-align: center;
            border: 2px solid var(--blue);
            border-radius: 40px; /* BARDZIEJ ZAOKRĄGLONE */
            box-shadow: 4px 4px 0 var(--blue);
            background-color: var(--white);
            color: var(--blue);
            transition: transform 0.15s, box-shadow 0.15s, background-color 0.2s, color 0.2s;
            font-family: var(--pixel); font-size: 1.4rem; letter-spacing: 2px;
        }

        .link-card:hover {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0 var(--blue);
            background-color: var(--blue);
            color: var(--white);
        }

        /* MATRIX EFFECT STYLES */
        .word-wrapper { position: relative; display: inline-block; width: 100%; height: 100%;}
        .word-original { transition: opacity 0s; display: inline-block; }
        .word-anim {
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
            opacity: 0; pointer-events: none; white-space: nowrap;
            font-family: var(--pixel); font-size: 1em; letter-spacing: 2px;
            color: var(--blue); background-color: var(--white); padding: 0 4px;
        }
        .word-wrapper.glitching .word-original { opacity: 0; }
        .word-wrapper.glitching .word-anim { opacity: 1; }
        
        /* Odwrócenie kolorów efektu Matrix podczas hover'a (bo przycisk robi się niebieski) */
        .link-card:hover .word-anim {
            color: var(--white);
            background-color: var(--blue);
        }

        @media (hover: none) and (pointer: coarse), (max-width: 768px) {
            #custom-cursor { display: none !important; }
            * { cursor: auto !important; }
            .link-card:hover { transform: none; box-shadow: 4px 4px 0 var(--blue); background-color: var(--white); color: var(--blue); }
            .link-card:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0 var(--blue); background-color: var(--blue); color: var(--white); }
        }
    </style>
</head>
<body class="lowercase">

    <script>
        // Smooth Scroll Logic (Lenis)
        const lenis = new Lenis({ 
            duration: 1.2, 
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) 
        });
        
        let isScrolling = false;
        let scrollTimeout;
        lenis.on('scroll', () => {
            if (!isScrolling) { document.body.classList.add('is-scrolling'); }
            isScrolling = true;
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                isScrolling = false;
                document.body.classList.remove('is-scrolling');
            }, 100);
        });

        function raf(time) { 
            lenis.raf(time); 
            requestAnimationFrame(raf); 
        }
        requestAnimationFrame(raf);

        // Custom Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        let mouseX = -100, mouseY = -100;

        function updateCursor() {
            cursor.style.transform = `translate3d(calc(${mouseX}px - 50%), calc(${mouseY}px - 50%), 0)`;
            requestAnimationFrame(updateCursor);
        }
        requestAnimationFrame(updateCursor);

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('mouseout', (e) => { if (e.relatedTarget === null) cursor.style.opacity = '0'; });
        document.addEventListener('mouseover', () => cursor.style.opacity = '1');

        function attachCursorEvents(el) {
            el.addEventListener('mouseenter', () => cursor.classList.add('cursor-' + el.getAttribute('data-cursor')));
            el.addEventListener('mouseleave', () => cursor.classList.remove('cursor-' + el.getAttribute('data-cursor')));
        }

        // Context Menu Logic
        const contextMenu = document.getElementById('context-menu');
        document.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            contextMenu.style.left = e.clientX + 'px';
            contextMenu.style.top = e.clientY + 'px';
            contextMenu.classList.add('active');
        });
        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) contextMenu.classList.remove('active');
        });

        // Glitch Matrix Effect Logic
        function applyMatrixHover(container) {
            const text = container.innerText.trim();
            if(!text) return;
            container.innerHTML = '';
            
            const wrapper = document.createElement('span');
            wrapper.className = 'word-wrapper';
            wrapper.dataset.state = 'normal';
            
            const original = document.createElement('span');
            original.className = 'word-original';
            original.innerText = text;
            
            const anim = document.createElement('span');
            anim.className = 'word-anim';
            
            wrapper.appendChild(original);
            wrapper.appendChild(anim);
            container.appendChild(wrapper);
            
            wrapper.addEventListener('mouseenter', () => toggleGlitchState(wrapper, text));
        }

        function toggleGlitchState(wrapper, word) {
            if (wrapper.dataset.animating === 'true') return;
            wrapper.dataset.animating = 'true';
            let nextState = wrapper.dataset.state === 'normal' ? 'pixelated' : 'normal';
            wrapper.dataset.state = nextState;
            wrapper.classList.add('glitching');
            
            const animSpan = wrapper.querySelector('.word-anim');
            const chars = "abcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*<>[]/-_=";
            let iterations = 0;
            const interval = setInterval(() => {
                animSpan.innerText = word.split("").map((letter, index) => {
                    if(index < iterations) return word[index];
                    return chars[Math.floor(Math.random() * chars.length)];
                }).join("");
                if(iterations >= word.length){
                    clearInterval(interval);
                    animSpan.innerText = word;
                    wrapper.dataset.animating = 'false';
                    if (nextState === 'normal') {
                        wrapper.classList.remove('glitching');
                        animSpan.innerText = '';
                    }
                }
                iterations += 1 / 2; 
            }, 30);
        }

        // Fetch Data from JSON to populate Links and Context Menu
        fetch('https://raw.githubusercontent.com/antonizabicki/queilinks/refs/heads/main/links.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('links-container');
                const contextContainer = document.getElementById('context-links');
                
                data.links.forEach(link => {
                    // MAIN BUTTONS
                    const a = document.createElement('a');
                    a.href = link.url;
                    a.className = 'link-card glitch-link';
                    a.setAttribute('data-cursor', 'link');
                    a.target = '_blank';
                    a.innerText = link.name;
                    container.appendChild(a);
                    
                    attachCursorEvents(a);
                    applyMatrixHover(a);

                    // CONTEXT MENU LINKS
                    const ctxA = document.createElement('a');
                    ctxA.href = link.url;
                    ctxA.className = 'context-item glitch-link';
                    ctxA.setAttribute('data-cursor', 'link');
                    ctxA.target = '_blank';
                    ctxA.innerText = link.name;
                    contextContainer.appendChild(ctxA);
                    
                    attachCursorEvents(ctxA);
                    applyMatrixHover(ctxA);
                });
            })
            .catch(error => {
                console.error('Błąd podczas wczytywania linków:', error);
                document.getElementById('links-container').innerHTML = '<p style="text-align:center; font-family:var(--pixel);">failed to load links.</p>';
            });
    </script>
</body>
</html>
